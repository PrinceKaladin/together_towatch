<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Together</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e; --border: #2e2e3e;
    --accent: #7c6af7; --accent2: #5b52d6; --text: #e8e8f0; --muted: #6b6b82;
    --msg-bg: #1e1e2a; --radius: 12px;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .viewers { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); }
  .viewers-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf77; }
  .main { flex: 1; display: flex; overflow: hidden; }
  .video-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 16px; gap: 12px; }
  .video-wrap { flex: 1; background: #000; border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 0; }
  video { width: 100%; height: 100%; object-fit: contain; display: none; }
  video.loaded { display: block; }
  .upload-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); cursor: pointer; width: 100%; height: 100%; }
  .upload-btn { background: var(--accent); color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  #file-input { display: none; }
  .progress-bar { display: none; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; width: 100%; }
  .progress-bar.show { display: block; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }
  .share-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: none; align-items: center; gap: 10px; font-size: 13px; }
  .share-bar.show { display: flex; }
  .share-url { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .copy-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 7px; cursor: pointer; }
  
  /* Плейлист */
  .playlist-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; display: none; flex-direction: column; gap: 5px; max-height: 120px; overflow-y: auto; }
  .playlist-box.show { display: flex; }
  .playlist-title { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .track-item { padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; background: var(--bg); border: 1px solid transparent; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .track-item:hover { border-color: var(--border); }
  .track-item.active { background: var(--accent); color: white; }

  .chat-panel { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface); }
  .chat-header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--muted); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
  .msg { background: var(--msg-bg); border-radius: 10px; padding: 8px 11px; font-size: 13.5px; border: 1px solid var(--border); }
  .msg.system { background: transparent; border: none; text-align: center; color: var(--muted); font-size: 12px; }
  .msg.own { background: #2a2060; border-color: #3d2e8a; }
  .msg-name { font-weight: 600; font-size: 11px; color: var(--accent); margin-bottom: 3px; }
  .chat-input-wrap { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); outline: none; }
  .send-btn { background: var(--accent); border: none; border-radius: 8px; color: #fff; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  
  .name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .name-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 320px; display: flex; flex-direction: column; gap: 16px; }
  .name-input { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; color: var(--text); outline: none; width: 100%; }
  .name-btn { background: var(--accent); border: none; border-radius: 9px; padding: 12px; color: #fff; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>

<div class="name-modal" id="name-modal">
  <div class="name-card">
    <h2>Как вас зовут?</h2>
    <p style="font-size:14px; color:var(--muted)">Это имя увидят все в комнате</p>
    <input class="name-input" id="name-input" placeholder="Ваше имя" maxlength="20" autofocus>
    <button class="name-btn" onclick="joinRoom()">Войти</button>
  </div>
</div>

<header>
  <div class="logo"><div class="logo-dot"></div>Watch Together</div>
  <div class="viewers"><div class="viewers-dot"></div><span id="viewer-count">0 онлайн</span></div>
</header>

<div class="main">
  <div class="video-panel">
    <div class="video-wrap" id="video-wrap">
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <p>Загрузить видео в комнату</p>
        <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Выбрать файл</button>
      </div>
      <video id="video" controls preload="auto" playsinline></video>
    </div>

    <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="playlist-box" id="playlist-box">
      <div class="playlist-title">Плейлист комнаты:</div>
      <div id="tracks-list" style="display:flex; flex-direction:column; gap:4px;"></div>
    </div>

    <div class="share-bar" id="share-bar">
      <span style="color:var(--muted)">Ссылка:</span>
      <div class="share-url" id="share-url"></div>
      <button class="copy-btn" onclick="copyLink()">Копировать</button>
      <button class="copy-btn" style="background:var(--accent)" onclick="document.getElementById('file-input').click()">+ Добавить ещё видео</button>
    </div>

    <input type="file" id="file-input" accept="video/*" onchange="uploadVideo(this)">
  </div>

  <div class="chat-panel">
    <div class="chat-header">Чат</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <input class="chat-input" id="chat-input" placeholder="Сообщение..." maxlength="300" onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()">➡️</button>
    </div>
  </div>
</div>

<script>
  let roomId = location.pathname.split('/room/')[1] || 'lobby';
  let myName = '';
  let ws = null;
  let isSyncing = false;
  let videoReady = false;
  const video = document.getElementById('video');

  function joinRoom() {
    const val = document.getElementById('name-input').value.trim();
    if (!val) return;
    myName = val;
    document.getElementById('name-modal').style.display = 'none';
    connectWS();
  }

  function connectWS() {
    if (ws) ws.close();
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/${roomId}?name=${encodeURIComponent(myName)}`);

    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'chat') addMsg(msg.name, msg.text, false);
      else if (msg.type === 'viewers') document.getElementById('viewer-count').textContent = msg.count + ' онлайн';
      else if (msg.type === 'sync') handleSync(msg);
      else if (msg.type === 'playlist_update') updatePlaylistUI(msg.playlist, msg.current_index);
    };
    ws.onclose = () => addSystemMsg('Отключено от сервера. Переподключение...');
  }

  function handleSync(msg) {
    if (!videoReady) return;
    isSyncing = true;
    if (Math.abs(video.currentTime - msg.time) > 1.5) video.currentTime = msg.time;
    if (msg.paused && !video.paused) video.pause();
    else if (!msg.paused && video.paused) video.play().catch(() => {});
    setTimeout(() => { isSyncing = false; }, 300);
  }

  // Event Listeners для синхронизации плеера
  video.addEventListener('play', () => {
    if (!isSyncing && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'sync', paused: false, time: video.currentTime }));
  });
  video.addEventListener('pause', () => {
    if (!isSyncing && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'sync', paused: true, time: video.currentTime }));
  });
  video.addEventListener('seeked', () => {
    if (!isSyncing && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'sync', paused: video.paused, time: video.currentTime }));
  });

  async function uploadVideo(input) {
    const file = input.files[0];
    if (!file) return;

    const bar = document.getElementById('progress-bar');
    const fill = document.getElementById('progress-fill');
    bar.classList.add('show');

    const formData = new FormData();
    formData.append('file', file);

    const xhr = new XMLHttpRequest();
    // Отправляем видео в контексте текущей комнаты
    xhr.open('POST', `/upload/${roomId}`);

    xhr.upload.onprogress = e => { if (e.lengthComputable) fill.style.width = (e.loaded / e.total * 100) + '%'; };
    xhr.onload = () => {
      bar.classList.remove('show');
      if (xhr.status !== 200) return addSystemMsg('Ошибка загрузки сессии');
      
      const data = JSON.parse(xhr.responseText);
      
      // Если мы были в лобби и сервер выдал нам новый ID комнаты
      if (roomId !== data.room_id) {
        roomId = data.room_id;
        history.pushState({}, '', `/room/${roomId}`);
        connectWS(); // Переподключаем вебсокет к правильной новой комнате
      }

      document.getElementById('share-url').textContent = location.origin + '/room/' + roomId;
      document.getElementById('share-bar').classList.add('show');
      
      // Уведомляем сервер об обновлении плейлиста для всех участников
      setTimeout(() => {
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'track_change', index: data.playlist.length - 1 }));
        }
      }, 500);
    };
    xhr.send(formData);
  }

  function loadVideo(filename) {
    const src = `/video/${roomId}/${encodeURIComponent(filename)}`;
    video.pause();
    video.src = src;
    video.load();
    video.classList.add('loaded');
    document.getElementById('upload-zone').style.display = 'none';
    videoReady = true;
  }

  function updatePlaylistUI(playlist, currentIndex) {
    const container = document.getElementById('tracks-list');
    container.innerHTML = '';
    document.getElementById('playlist-box').classList.add('show');

    playlist.forEach((track, idx) => {
      const el = document.createElement('div');
      el.className = `track-item ${idx === currentIndex ? 'active' : ''}`;
      el.textContent = `${idx + 1}. ${track}`;
      el.onclick = () => {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'track_change', index: idx }));
      };
      container.appendChild(el);
    });

    if (playlist[currentIndex]) {
      loadVideo(playlist[currentIndex]);
    }
  }

  function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !ws) return;
    ws.send(JSON.stringify({ type: 'chat', text }));
    addMsg(myName, text, true);
    input.value = '';
  }

  function addMsg(name, text, own) {
    const box = document.getElementById('chat-messages');
    const d = document.createElement('div');
    d.className = 'msg' + (own ? ' own' : '');
    d.innerHTML = `<div class="msg-name">${escHtml(name)}</div>${escHtml(text)}`;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  function addSystemMsg(text) {
    const box = document.getElementById('chat-messages');
    const d = document.createElement('div');
    d.className = 'msg system';
    d.textContent = text;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('share-url').textContent).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Скопировано!';
      setTimeout(() => btn.textContent = 'Копировать', 2000);
    });
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Получаем информацию о плейлисте при входе по прямой ссылке
  if (roomId !== 'lobby') {
    fetch(`/room-info/${roomId}`).then(r => r.json()).then(data => {
      if (data.playlist && data.playlist.length > 0) {
        document.getElementById('share-url').textContent = location.href;
        document.getElementById('share-bar').classList.add('show');
        updatePlaylistUI(data.playlist, data.current_index);
      }
    });
  }
</script>
</body>
</html>
