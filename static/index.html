<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Watch Together Ultimate (FastAPI)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e; --border: #2e2e3e;
    --accent: #7c6af7; --accent2: #5b52d6; --text: #e8e8f0; --muted: #6b6b82;
    --msg-bg: #1e1e2a; --radius: 12px;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .main { flex: 1; display: flex; overflow: hidden; }
  .video-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 16px; gap: 12px; }
  .video-wrap { flex: 1; background: #000; border-radius: var(--radius); overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; }
  video, #yt-player { width: 100%; height: 100%; border: none; display: none; }
  .active-player { display: block !important; }
  
  .control-tabs { display: flex; gap: 8px; background: var(--surface); padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
  .tab-btn { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .inputs-zone { background: var(--surface); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
  .hidden { display: none !important; }
  
  input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); outline: none; font-size: 14px; }
  .action-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; }
  .danger-btn { background: #e05c5c; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

  .playlist-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; display: none; flex-direction: column; gap: 5px; max-height: 150px; overflow-y: auto; }
  .playlist-box.show { display: flex; }
  .track-item { padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; background: var(--bg); display: flex; justify-content: space-between; align-items: center; }
  .track-item.active { background: var(--surface2); border-left: 4px solid var(--accent); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(5px); }
  .catalog-card { background: var(--surface); width: 650px; max-width: 95%; height: 550px; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; gap: 15px; }
  .catalog-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

  .chat-panel { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
  .msg { background: var(--msg-bg); border-radius: 10px; padding: 8px 11px; font-size: 13.5px; border: 1px solid var(--border); }
  .name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 300; }
  /* Мобильная адаптация */
/* Полный мобайл адаптив с фиксацией видео сверху */
.users-sidebar {
  position: fixed;
  top: 0;
  left: -280px; /* Изначально спрятана */
  width: 260px;
  height: 100dvh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 250;
  transition: left 0.3s ease;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  box-shadow: 5px 0 15px rgba(0,0,0,0.5);
}
.users-sidebar.open {
  left: 0; /* Показываем */
}
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 240;
  display: none;
  backdrop-filter: blur(2px);
}
.sidebar-overlay.show {
  display: block;
}
.user-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  padding: 6px 0;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #5ce087; /* Зеленый онлайн */
}
@media (max-width: 768px) {
  body {
    height: 100dvh; /* Жестко держим высоту экрана */
    overflow: hidden; /* Запрещаем скролл всей страницы, скроллиться будет только чат */
    display: flex;
    flex-direction: column;
  }

  header {
    height: 44px; /* Чуть компактнее на мобилках */
    flex-shrink: 0;
  }

  .main {
    flex-direction: column;
    overflow: hidden;
    height: calc(100dvh - 44px); /* Занимает всё оставшееся место */
  }

  /* Панель с плеером намертво прижата наверх */
  .video-panel {
    padding: 8px;
    gap: 8px;
    flex-shrink: 0;
    width: 100%;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .video-wrap {
    aspect-ratio: 16 / 9;
    flex: none;
    height: auto;
    min-height: auto;
  }

  .control-tabs {
    padding: 6px;
    flex-wrap: nowrap;
    overflow-x: auto; /* Если кнопки не влезут, их можно скроллить горизонтально */
  }
  
  .tab-btn {
    padding: 6px 10px;
    font-size: 12px;
    white-space: nowrap;
  }

  .inputs-zone {
    padding: 8px;
  }

  #tab-link, #tab-youtube {
    flex-direction: column;
    gap: 6px !important;
  }

  /* Чат занимает всё свободное место снизу */
  .chat-panel {
    flex: 1; 
    width: 100%;
    height: auto;
    border-left: none;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Сообщения внутри чата скроллятся сами по себе */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    max-height: none; 
    padding: 10px;
  }

  .chat-input-wrap {
    padding: 8px;
    background: var(--surface);
    position: relative;
  }

  /* Модалка каталога на весь экран */
  .catalog-card {
    width: 100%;
    height: 100dvh;
    border-radius: 0;
    border: none;
  }
}
</style>
<script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<div class="users-sidebar" id="users-sidebar">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h3>В комнате</h3>
    <button class="tab-btn" onclick="toggleSidebar(false)">❌</button>
  </div>
  <hr style="border: none; border-top: 1px solid var(--border);">
  <div id="users-list-container" style="display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1;">
    </div>
</div>
<div class="name-modal" id="name-modal">
  <div style="background:var(--surface); padding:32px; border-radius:16px; width:320px; display:flex; flex-direction:column; gap:16px;">
    <h2>Как вас зовут?</h2>
    <input id="name-input" placeholder="Ваше имя" maxlength="20" autofocus onkeydown="if(event.key==='Enter') joinRoom()">
    <button class="action-btn" onclick="joinRoom()">Войти</button>
  </div>
</div>

<div class="modal-overlay hidden" id="catalog-modal" onclick="toggleCatalog(false)">
  <div class="catalog-card" onclick="event.stopPropagation()">
    <div style="display:flex; justify-content:space-between; align-items:center; gap: 10px;">
      <h3>Медиатека релизов</h3>
      <input id="catalog-search" placeholder="Поиск фильма/сериала..." oninput="searchCatalog()" style="width: 250px;">
      <button class="tab-btn" onclick="toggleCatalog(false)">❌ Закрыть</button>
    </div>
    <div class="catalog-list" id="catalog-items-container"></div>
  </div>
</div>

<header>
  <div class="logo">
    <button class="tab-btn" onclick="toggleSidebar(true)" style="padding: 4px 8px; margin-right: 5px;">👥 Участники</button>
    <div class="logo-dot"></div>Watch Together
  </div>
  <div style="display: flex; align-items: center; gap: 10px;">
    <div id="room-display-id" style="font-size:13px; color:var(--muted)">Комната: Загрузка...</div>
    <button class="tab-btn" onclick="navigator.clipboard.writeText(location.href); alert('Ссылка скопирована!')">📋 Копировать ссылку</button>
    <button class="tab-btn" style="background: var(--surface2)" onclick="location.href='/'">➕ Новая комната</button>
  </div>
</header>

<div class="main">
  <div class="video-panel">
    <div class="video-wrap">
      <div id="no-video-stub" style="color:var(--muted); position:absolute;">Плеер пуст. Откройте медиатеку.</div>
      <video id="video" controls playsinline></video>
      <div id="yt-player"></div>
    </div>

    <div class="control-tabs">
      <button class="tab-btn" onclick="switchTab('link')">🔗 Прямая ссылка</button>
      <button class="tab-btn" onclick="switchTab('youtube')">🔴 YouTube</button>
      <button class="tab-btn" style="background:var(--accent)" onclick="toggleCatalog(true)">🎬 Открыть Медиатеку</button>
    </div>

    <div class="inputs-zone">
      <div id="tab-link" class="tab-content" style="display:flex; gap:8px;">
        <input id="input-link-url" placeholder="Ссылка на файл .mp4" style="flex:1">
        <input id="input-link-name" placeholder="Название трека">
        <button class="action-btn" onclick="addDirectLink()">Добавить</button>
      </div>
      <div id="tab-youtube" class="tab-content hidden" style="display:flex; gap:8px;">
        <input id="input-yt-url" placeholder="Ссылка на YouTube" style="flex:1">
        <button class="action-btn" onclick="addYouTubeLink()">Добавить</button>
      </div>
    </div>

    <div class="playlist-box" id="playlist-box">
      <div id="tracks-list" style="display:flex; flex-direction:column; gap:4px;"></div>
    </div>
  </div>

  <div class="chat-panel">
    <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-wrap" style="padding:12px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px;">
      <input class="chat-input" id="chat-input" placeholder="Сообщение..." style="width:100%" onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="mic-btn" class="action-btn" style="background: var(--surface2); border: 1px solid var(--border); width: 100%; font-size: 13px; padding: 8px 12px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s ease;" onclick="toggleMic()">
        <span>🎤</span> <span id="mic-text">Микрофон: ВЫКЛ</span>
      </button>
      <div id="remote-audios" style="display:none;"></div>
    </div>
</div>

<script>
  let roomId = location.pathname.split('/room/')[1] || 'lobby';
  let myName = '', ws = null, isSyncing = false, ytPlayer = null, currentTrackType = 'link';

  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player', {
      height: '100%', width: '100%',
      playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'enablejsapi': 1 },
      events: { 'onStateChange': onPlayerStateChange }
    });
  }

function joinRoom() {
  const inputName = document.getElementById('name-input').value.trim();
  if (!inputName) return;
  
  myName = inputName;
  localStorage.setItem('watch_together_name', myName);
  
  document.getElementById('name-modal').style.display = 'none';
  
  // Красиво выводим ID текущей комнаты в шапку
  document.getElementById('room-display-id').textContent = 'Комната ID: ' + roomId;
  
  connectWS();
}

  function toggleSidebar(show) {
  document.getElementById('users-sidebar').classList.toggle('open', show);
  document.getElementById('sidebar-overlay').classList.toggle('show', show);
}

// Измени функцию connectWS, добавив проверку room_users:
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  
  // Перед подключением ПРИНУДИТЕЛЬНО берём актуальный ID из localStorage
  myUserId = localStorage.getItem('watch_together_user_id') || null;

  let url = `${proto}://${location.host}/ws/${roomId}?name=${encodeURIComponent(myName)}`;
  if (myUserId && myUserId !== "null") {
    url += `&user_id=${myUserId}`;
  }

  ws = new WebSocket(url);
  
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'chat') addMsg(msg.name, msg.text);
    if (msg.type === 'playlist_update') renderPlaylist(msg.playlist, msg.current_index);
    if (msg.type === 'sync') handleSyncCommand(msg);
    if (msg.type === 'room_users') renderUsersList(msg.users);
    if (msg.type === 'room_users') {
      renderUsersList(msg.users);
      
      // Перебираем юзеров для создания звонка
      msg.users.forEach(user => {
        if (user.user_id !== myUserId && !peerConnections[user.user_id]) {
          // Ролевая модель: создаем offer только если наш ID больше ID собеседника
          // Это гарантирует, что только ОДИН из двух начнет звонок, избегая конфликта
          const isOfferInitiator = myUserId > user.user_id; 
          initWebRTCConnection(user.user_id, isOfferInitiator);
        }
      });
    }
    if (msg.type === 'welcome') { 
        // Сохраняем в переменную сессии
        myUserId = msg.user_id; 
        // И сразу же намертво пишем в память браузера
        localStorage.setItem('watch_together_user_id', msg.user_id);
    }
    else if (msg.type === "webrtc_offer") { handleOffer(msg); }
    else if (msg.type === "webrtc_answer") { peerConnections[msg.sender_id].setRemoteDescription(new RTCSessionDescription(msg.sdp)); }
    else if (msg.type === "webrtc_candidate") { peerConnections[msg.sender_id].addIceCandidate(new RTCIceCandidate(msg.candidate)); }
    else if (msg.type === "webrtc_user_disconnected") {
        if (peerConnections[msg.user_id]) {
            peerConnections[msg.user_id].close();
            delete peerConnections[msg.user_id];
            const el = document.getElementById(`audio-${msg.user_id}`);
            if(el) el.remove();
        }
        const userElement = document.getElementById(`user-item-${msg.user_id}`);
        if (userElement) userElement.remove();
    }
  };
}

// Функция рендеринга пользователей в панель
function renderUsersList(users) {
  const container = document.getElementById('users-list-container');
  container.innerHTML = '';
  users.forEach(u => {
    const el = document.createElement('div');
    el.className = 'user-item';
    // Присваиваем ID, чтобы узел можно было легко удалить при дисконнекте
    el.id = `user-item-${u.user_id}`; 
    
    const isMe = u.name === myName ? ' <span style="color:var(--muted); font-size:11px;">(Вы)</span>' : '';
    el.innerHTML = `<div class="status-dot"></div><span>${u.name}${isMe}</span>`;
    container.appendChild(el);
  });
}

  const nativeVideo = document.getElementById('video');
  nativeVideo.addEventListener('play', () => { if(!isSyncing && currentTrackType!=='youtube') sendSync(false, nativeVideo.currentTime); });
  nativeVideo.addEventListener('pause', () => { if(!isSyncing && currentTrackType!=='youtube') sendSync(true, nativeVideo.currentTime); });
  nativeVideo.addEventListener('seeked', () => { if(!isSyncing && currentTrackType!=='youtube') sendSync(nativeVideo.paused, nativeVideo.currentTime); });

  function onPlayerStateChange(event) {
    if (isSyncing || currentTrackType !== 'youtube') return;
    if (event.data === YT.PlayerState.PLAYING) sendSync(false, ytPlayer.getCurrentTime(), 'youtube');
    if (event.data === YT.PlayerState.PAUSED) sendSync(true, ytPlayer.getCurrentTime(), 'youtube');
  }

  function sendSync(paused, time, type='native') {
    if (ws?.readyState === 1) ws.send(JSON.stringify({ type: 'sync', player: type, paused: paused, time: time }));
  }

  function handleSyncCommand(msg) {
    isSyncing = true;
    if (msg.player === 'youtube' && ytPlayer?.seekTo) {
      if (Math.abs(ytPlayer.getCurrentTime() - msg.time) > 2) ytPlayer.seekTo(msg.time, true);
      if (msg.paused) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
    } else if (msg.player === 'native') {
      if (Math.abs(nativeVideo.currentTime - msg.time) > 1.5) nativeVideo.currentTime = msg.time;
      if (msg.paused) nativeVideo.pause(); else nativeVideo.play().catch(()=>{});
    }
    setTimeout(() => isSyncing = false, 400);
  }

  function renderPlaylist(playlist, currentIndex) {
    const box = document.getElementById('playlist-box');
    const container = document.getElementById('tracks-list');
    container.innerHTML = '';
    if(!playlist.length) return box.classList.remove('show');
    box.classList.add('show');

    playlist.forEach((track, idx) => {
      const el = document.createElement('div');
      el.className = `track-item ${idx === currentIndex ? 'active' : ''}`;
      el.innerHTML = `
        <span onclick="changeTrack(${idx})">▶️ ${track.name} [${track.type.toUpperCase()}]</span>
        <button class="danger-btn" onclick="deleteTrack(${idx}, event)">Удалить</button>
      `;
      container.appendChild(el);
    });

    const active = playlist[currentIndex];
    if (active) {
      document.getElementById('no-video-stub').style.display = 'none';
      currentTrackType = active.type;
      if (active.type === 'youtube') {
        nativeVideo.classList.remove('active-player'); nativeVideo.pause();
        document.getElementById('yt-player').classList.add('active-player');
        if (ytPlayer?.cueVideoById) ytPlayer.cueVideoById(active.src);
      } else {
        document.getElementById('yt-player').classList.remove('active-player'); if(ytPlayer?.pauseVideo) ytPlayer.pauseVideo();
        nativeVideo.classList.add('active-player'); nativeVideo.src = active.src; nativeVideo.load();
      }
    }
  }

  async function deleteTrack(index, e) {
    e.stopPropagation();
    await fetch(`/api/room/${roomId}/remove/${index}`, { method: 'DELETE' });
  }

  function changeTrack(index) {
    if (ws?.readyState === 1) ws.send(JSON.stringify({ type: 'track_change', index: index }));
  }

  function toggleCatalog(show) {
    const modal = document.getElementById('catalog-modal');
    if (show) { modal.classList.remove('hidden'); searchCatalog(); }
    else modal.classList.add('hidden');
  }

  async function searchCatalog() {
    const q = document.getElementById('catalog-search').value;
    const r = await fetch(`/api/presets?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    const container = document.getElementById('catalog-items-container');
    container.innerHTML = '';

    data.forEach(p => {
      const el = document.createElement('div');
      el.style = 'display: flex; gap: 15px; background: var(--surface2); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom:10px;';
      el.innerHTML = `
        <img src="${p.cover}" style="width: 90px; height: 130px; object-fit: cover; border-radius: 6px; flex-shrink: 0;">
        <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
          <h4 style="font-size: 15px;">${p.title} <span style="font-size:11px;color:var(--muted)">(${p.type==='movie'?'Фильм':'Сериал'})</span></h4>
          <p style="font-size:12px;color:var(--muted);">${p.description}</p>
          <div style="margin-top:6px; display:flex; flex-direction:column; gap:4px; max-height:80px; overflow-y:auto;" id="episodes-${p.id}"></div>
          <button class="action-btn" style="padding:4px 8px; font-size:12px; margin-top:auto; align-self:flex-start;" onclick="addPresetToRoom(${p.id}, -1)">Добавить весь релиз</button>
        </div>
      `;
      container.appendChild(el);

      const epContainer = document.getElementById(`episodes-${p.id}`);
      p.episodes.forEach((ep, eIdx) => {
        const row = document.createElement('div');
        row.style = 'display:flex; justify-content:space-between; font-size:12px; background:var(--bg); padding:4px; border-radius:4px;';
        row.innerHTML = `<span>${ep.name}</span> <a href="#" style="color:var(--accent); text-decoration:none;" onclick="addPresetToRoom(${p.id}, ${eIdx})">＋ Серию</a>`;
        epContainer.appendChild(row);
      });
    });
  }

  async function addPresetToRoom(presetId, episodeIndex) {
    const r = await fetch(`/api/presets`);
    const presets = await r.json();
    const preset = presets.find(p => p.id === presetId);
    let itemsToAdd = (episodeIndex === -1) ? preset.episodes : [preset.episodes[episodeIndex]];

    await fetch(`/api/room/${roomId}/add-content`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: itemsToAdd })
    });
    toggleCatalog(false);
  }

  async function addYouTubeLink() {
    const url = document.getElementById('input-yt-url').value.trim();
    if(!url) return;
    await fetch(`/api/room/${roomId}/add-content`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: [{ type: 'youtube', src: url, name: 'YouTube Видео' }] })
    });
    document.getElementById('input-yt-url').value = '';
  }

  async function addDirectLink() {
    const url = document.getElementById('input-link-url').value.trim();
    const name = document.getElementById('input-link-name').value.trim() || 'Видео по ссылке';
    if(!url) return;
    await fetch(`/api/room/${roomId}/add-content`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: [{ type: 'link', name: name, src: url }] })
    });
    document.getElementById('input-link-url').value = '';
    document.getElementById('input-link-name').value = '';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
  }

  function sendMessage() {
    const input = document.getElementById('chat-input');
    if(!input.value.trim() || !ws) return;

    input.value = '';
  }

  function addMsg(n, t) {
    const b = document.getElementById('chat-messages');
    b.innerHTML += `<div class="msg"><b style="color:var(--accent)">${n}:</b> ${t}</div>`;
    b.scrollTop = b.scrollHeight;
  }

async function toggleMic() {
  const btn = document.getElementById('mic-btn');
  const btnText = document.getElementById('mic-text');
  
  if (!isMicActive) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      isMicActive = true;
      
      // Красивый зеленый акцент, гармонирующий с темной темой
      btnText.textContent = "Микрофон: ОНЛАЙН";
      btn.style.background = "rgba(92, 224, 135, 0.15)";
      btn.style.borderColor = "#5ce087";
      btn.style.color = "#5ce087";
      
      ws.send(JSON.stringify({ type: "chat", text: "🎙️ Включил микрофон в прямом эфире!" }));
    } catch (e) {
      alert("Не удалось получить доступ к микрофону. Проверь разрешения в браузере.");
    }
  } else {
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
    }
    isMicActive = false;
    
    // Возвращаем исходный дефолтный стиль интерфейса
    btnText.textContent = "Микрофон: ВЫКЛ";
    btn.style.background = "var(--surface2)";
    btn.style.borderColor = "var(--border)";
    btn.style.color = "var(--text)";
    
    Object.keys(peerConnections).forEach(id => {
      peerConnections[id].close();
      delete peerConnections[id];
    });
  }
}
function createPeerConnection(targetId) {
  const pc = new RTCPeerConnection(rtcConfig);
  peerConnections[targetId] = pc;

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      ws.send(JSON.stringify({ type: "webrtc_candidate", target_id: targetId, candidate: event.candidate }));
    }
  };

  pc.ontrack = (event) => {
    let audioEl = document.getElementById(`audio-${targetId}`);
    if (!audioEl) {
      audioEl = document.createElement('audio');
      audioEl.id = `audio-${targetId}`;
      audioEl.autoplay = true;
      document.getElementById('remote-audios').appendChild(audioEl);
    }
    audioEl.srcObject = event.streams[0];
  };

  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }
  return pc;
}

async function handleOffer(msg) {
    const senderId = msg.sender_id;
    
    // Если соединения с этим человеком еще нет — создаем его (как отвечающий, isOffer = false)
    if (!peerConnections[senderId]) {
        await initWebRTCConnection(senderId, false);
    }
    
    const pc = peerConnections[senderId];
    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    
    ws.send(JSON.stringify({
        type: 'webrtc_answer',
        target_id: senderId,
        sdp: pc.localDescription
    }));
}
